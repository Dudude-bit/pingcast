linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  gosec:
    excludes:
      - G104 # we handle errors explicitly now
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-dirs:
    - internal/sqlc/gen
    - internal/api/gen
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # Test files often contain mock HTTP handlers (w.Write, json.Decode)
    # whose errors are not meaningful to the test. Production code should
    # still check these — hence scoped to _test.go only.
    - path: _test\.go
      linters:
        - errcheck
    # testdb.go is test-only infrastructure (testcontainers setup/teardown);
    # errors on Terminate during cleanup are classic deferred-close pattern.
    - path: tests/integration/testdb\.go
      linters:
        - errcheck
