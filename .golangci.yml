linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  gosec:
    excludes:
      - G104 # we handle errors explicitly now
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-dirs:
    - internal/sqlc/gen
    - internal/api/gen
  max-issues-per-linter: 50
  max-same-issues: 10
