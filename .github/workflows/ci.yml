name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pingcast
          POSTGRES_PASSWORD: pingcast
          POSTGRES_DB: pingcast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pingcast"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Build all services
        run: |
          go build -o /tmp/api ./cmd/api/
          go build -o /tmp/checker ./cmd/checker/
          go build -o /tmp/notifier ./cmd/notifier/

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://pingcast:pingcast@localhost:5432/pingcast_test?sslmode=disable
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...
