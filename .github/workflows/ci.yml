name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1' # Weekly Monday 3 AM UTC
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: 'Run load tests'
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Build all services
        run: |
          go build -o /tmp/api ./cmd/api/
          go build -o /tmp/scheduler ./cmd/scheduler/
          go build -o /tmp/worker ./cmd/worker/
          go build -o /tmp/notifier ./cmd/notifier/

      - name: Vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -short ./... -v -count=1

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pingcast
          POSTGRES_PASSWORD: pingcast
          POSTGRES_DB: pingcast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pingcast"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://pingcast:pingcast@localhost:5432/pingcast_test?sslmode=disable
        run: go test ./... -v -count=1 -timeout=15m

  load-tests:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_load_tests) ||
      contains(github.event.pull_request.labels.*.name, 'load-test')
    runs-on: ubuntu-latest
    needs: [integration-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pingcast
          POSTGRES_PASSWORD: pingcast
          POSTGRES_DB: pingcast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pingcast"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Run load tests
        env:
          TEST_DATABASE_URL: postgres://pingcast:pingcast@localhost:5432/pingcast_test?sslmode=disable
        run: go test ./... -v -count=1 -run='^TestLoad' -timeout=30m
