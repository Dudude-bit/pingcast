{{define "title"}}Sign Up — PingCast{{end}}
{{define "content"}}
<div class="auth-form">
    <h1>Create Account</h1>
    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
    <form method="POST" action="/register">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus>
        </div>
        <div class="form-group">
            <label for="slug">Username (for your status page)</label>
            <input type="text" id="slug" name="slug" required pattern="[a-z0-9-]{3,30}" placeholder="my-company">
            <small>3-30 chars, lowercase letters, numbers, hyphens</small>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
</div>
{{end}}
