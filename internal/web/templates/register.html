{{define "title"}}Sign Up &mdash; PingCast{{end}}
{{define "content"}}
<div class="auth-container">
    <h1>Create your account</h1>
    <p class="subtitle">Start monitoring in under a minute</p>

    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}

    <form method="POST" action="/register">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus placeholder="you@company.com">
        </div>
        <div class="form-group">
            <label for="slug">Username</label>
            <input type="text" id="slug" name="slug" required pattern="[a-z0-9-]{3,30}" placeholder="my-company">
            <small>Your status page will be at /status/your-username</small>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="Min. 8 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
    </form>

    <p class="auth-link">Already have an account? <a href="/login">Sign in</a></p>
</div>
{{end}}
