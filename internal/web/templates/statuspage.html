<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status &mdash; {{.Slug}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="page-content">
            <div class="container" style="max-width: 720px;">
                <div class="statuspage-header">
                    <h1>System Status</h1>
                    {{if .AllUp}}
                    <div class="overall-status up">
                        <span class="status-dot status-dot-up"></span>
                        All Systems Operational
                    </div>
                    {{else}}
                    <div class="overall-status down">
                        <span class="status-dot status-dot-down"></span>
                        Degraded Performance
                    </div>
                    {{end}}
                </div>

                <div class="section-title">Services</div>
                {{range .Monitors}}
                <div class="status-monitor-row">
                    <span class="name">{{.Name}}</span>
                    <div class="right">
                        <span class="uptime">{{printf "%.2f" .Uptime90d}}%</span>
                        <span class="status-badge {{if eq .CurrentStatus "up"}}status-badge-up{{else}}status-badge-down{{end}}">
                            <span class="status-dot {{if eq .CurrentStatus "up"}}status-dot-up{{else}}status-dot-down{{end}}"></span>
                            {{if eq .CurrentStatus "up"}}Operational{{else}}Down{{end}}
                        </span>
                    </div>
                </div>
                {{end}}

                {{if .ShowBranding}}
                <footer class="footer" style="margin-top: 4rem;">
                    <p>Powered by <a href="/">PingCast</a></p>
                </footer>
                {{end}}
            </div>
        </main>
    </div>
</body>
</html>
