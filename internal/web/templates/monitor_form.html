{{define "title"}}{{if .Monitor}}Edit{{else}}New{{end}} Monitor — PingCast{{end}}
{{define "content"}}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{{if .Monitor}}Edit Monitor{{else}}New Monitor{{end}}</h2>
    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
    <form method="POST" action="{{if .Monitor}}/monitors/{{.Monitor.ID}}{{else}}/monitors{{end}}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required value="{{if .Monitor}}{{.Monitor.Name}}{{end}}" placeholder="My Website">
        </div>
        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" name="url" required value="{{if .Monitor}}{{.Monitor.Url}}{{end}}" placeholder="https://example.com">
        </div>
        <div class="form-group">
            <label for="method">Method</label>
            <select id="method" name="method">
                <option value="GET" {{if and .Monitor (eq .Monitor.Method "GET")}}selected{{end}}>GET</option>
                <option value="POST" {{if and .Monitor (eq .Monitor.Method "POST")}}selected{{end}}>POST</option>
            </select>
        </div>
        <div class="form-group">
            <label for="interval_seconds">Check Interval</label>
            <select id="interval_seconds" name="interval_seconds">
                {{if eq .User.Plan "pro"}}
                <option value="30" {{if and .Monitor (eq .Monitor.IntervalSeconds 30)}}selected{{end}}>30 seconds</option>
                <option value="60" {{if and .Monitor (eq .Monitor.IntervalSeconds 60)}}selected{{end}}>1 minute</option>
                {{end}}
                <option value="300" {{if and .Monitor (eq .Monitor.IntervalSeconds 300)}}selected{{end}}>5 minutes</option>
            </select>
        </div>
        <div class="form-group">
            <label for="expected_status">Expected Status Code</label>
            <input type="number" id="expected_status" name="expected_status" value="{{if .Monitor}}{{.Monitor.ExpectedStatus}}{{else}}200{{end}}">
        </div>
        <div class="form-group">
            <label for="alert_after_failures">Alert After Failures</label>
            <input type="number" id="alert_after_failures" name="alert_after_failures" min="1" max="10" value="{{if .Monitor}}{{.Monitor.AlertAfterFailures}}{{else}}3{{end}}">
        </div>
        <div class="form-group">
            <label><input type="checkbox" name="is_public" {{if and .Monitor .Monitor.IsPublic}}checked{{end}}> Show on status page</label>
        </div>
        <button type="submit" class="btn btn-primary btn-full">{{if .Monitor}}Save Changes{{else}}Create Monitor{{end}}</button>
    </form>
</div>
{{end}}
