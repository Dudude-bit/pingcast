{{define "title"}}New API Key &mdash; PingCast{{end}}
{{define "content"}}
<div class="auth-container" style="max-width: 520px;">
    <h1>New API Key</h1>
    <p class="subtitle">Create a key to access the PingCast API</p>

    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}

    <form method="POST" action="/api-keys">
        {{if .CsrfToken}}<input type="hidden" name="_csrf" value="{{.CsrfToken}}">{{end}}
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="My CI/CD key">
        </div>

        <div class="form-group">
            <label>Scopes</label>
            <label class="check-label">
                <input type="checkbox" name="scopes" value="monitors:read">
                monitors:read
            </label>
            <label class="check-label">
                <input type="checkbox" name="scopes" value="monitors:write">
                monitors:write
            </label>
            <label class="check-label">
                <input type="checkbox" name="scopes" value="channels:read">
                channels:read
            </label>
            <label class="check-label">
                <input type="checkbox" name="scopes" value="channels:write">
                channels:write
            </label>
        </div>

        <div class="form-group">
            <label for="expires">Expires In</label>
            <select id="expires" name="expires">
                <option value="30">30 days</option>
                <option value="90">90 days</option>
                <option value="365">1 year</option>
                <option value="0">Never</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">Create API Key</button>
    </form>

    <p class="auth-link" style="margin-top: 1rem;">
        <a href="/api-keys">&larr; Back to API Keys</a>
    </p>
</div>
{{end}}
