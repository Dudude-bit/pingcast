version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "../database/migrations"
    gen:
      go:
        package: "gen"
        out: "gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "pg_catalog.varchar"
            nullable: true
            go_type:
              type: "*string"
              pointer: false
          - db_type: "text"
            nullable: true
            go_type:
              type: "*string"
              pointer: false
