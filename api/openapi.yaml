openapi: "3.0.3"
info:
  title: PingCast API
  version: "2.0.0"
  description: Uptime monitoring API with multi-type checks

paths:
  /api/auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Logged out

  /api/monitor-types:
    get:
      operationId: listMonitorTypes
      tags: [monitors]
      responses:
        "200":
          description: Available monitor types with config schemas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonitorTypeInfo"

  /api/monitors:
    get:
      operationId: listMonitors
      tags: [monitors]
      security:
        - sessionAuth: []
      responses:
        "200":
          description: List of monitors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonitorWithUptime"
    post:
      operationId: createMonitor
      tags: [monitors]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorRequest"
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          description: Validation error or limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/monitors/{id}:
    get:
      operationId: getMonitor
      tags: [monitors]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Monitor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorDetail"
        "404":
          description: Not found
    put:
      operationId: updateMonitor
      tags: [monitors]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonitorRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
    delete:
      operationId: deleteMonitor
      tags: [monitors]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /api/monitors/{id}/pause:
    post:
      operationId: toggleMonitorPause
      tags: [monitors]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"

  /api/channel-types:
    get:
      operationId: listChannelTypes
      tags: [channels]
      responses:
        "200":
          description: Available channel types with config schemas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelTypeInfo"

  /api/channels:
    get:
      operationId: listChannels
      tags: [channels]
      security:
        - sessionAuth: []
      responses:
        "200":
          description: User's channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationChannel"
    post:
      operationId: createChannel
      tags: [channels]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/channels/{id}:
    get:
      operationId: getChannel
      tags: [channels]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateChannel
      tags: [channels]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
    delete:
      operationId: deleteChannel
      tags: [channels]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /api/monitors/{id}/channels:
    post:
      operationId: bindChannel
      tags: [channels]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_id]
              properties:
                channel_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Bound

  /api/monitors/{id}/channels/{channelId}:
    delete:
      operationId: unbindChannel
      tags: [channels]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: channelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Unbound

  /api/incidents:
    post:
      operationId: createIncident
      tags: [incidents]
      security:
        - sessionAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentRequest"
      responses:
        "201":
          description: Manual incident opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "402":
          description: Pro subscription required
        "403":
          description: Not the owner of the monitor
        "422":
          description: Validation error

  /api/incidents/{id}/state:
    patch:
      operationId: updateIncidentState
      tags: [incidents]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentStateRequest"
      responses:
        "200":
          description: State changed; returns the new IncidentUpdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentUpdate"
        "402":
          description: Pro subscription required
        "403":
          description: Not the owner of the monitor
        "409":
          description: Invalid state transition

  /api/incidents/{id}/updates:
    get:
      operationId: listIncidentUpdates
      tags: [incidents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Chronological timeline for the incident (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncidentUpdate"

  /api/import/atlassian:
    post:
      operationId: importAtlassian
      tags: [import]
      security:
        - sessionAuth: []
        - bearerAuth: []
      description: |
        Accepts a raw Atlassian Statuspage v1 JSON export body. Creates
        monitors from components, incidents with preserved states, and
        the full incident_updates timeline. Pro-gated; all-or-nothing
        transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Import result counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtlassianImportResult"
        "400":
          description: Invalid or unsupported export
        "402":
          description: Pro subscription required

  /api/me/branding:
    get:
      operationId: getMyBranding
      tags: [branding]
      security:
        - sessionAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Current branding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branding"
    patch:
      operationId: updateMyBranding
      tags: [branding]
      security:
        - sessionAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Branding"
      responses:
        "200":
          description: Updated branding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branding"
        "402":
          description: Pro subscription required

  /api/billing/founder-status:
    get:
      operationId: getFounderStatus
      tags: [billing]
      description: |
        Returns whether the $9 founder's-price variant still has seats
        left. The landing and pricing pages call this to decide which
        LemonSqueezy checkout URL to expose. Public (no auth). Cached
        60s at the handler.
      responses:
        "200":
          description: Founder cap status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FounderStatus"

  /api/stats/public:
    get:
      operationId: getPublicStats
      tags: [stats]
      description: Unauthenticated counters for the landing-page trust bar. Cached 5 minutes.
      responses:
        "200":
          description: Public stats counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStats"

  /api/status/{slug}:
    get:
      operationId: getStatusPage
      tags: [status]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public status page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusPageResponse"
        "404":
          description: User not found

  /api/api-keys:
    get:
      operationId: listAPIKeys
      tags: [api-keys]
      security:
        - sessionAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: User's API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"
    post:
      operationId: createAPIKey
      tags: [api-keys]
      security:
        - sessionAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created. Raw key is returned only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreated"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/api-keys/{id}:
    delete:
      operationId: revokeAPIKey
      tags: [api-keys]
      security:
        - sessionAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Key revoked

  /health:
    get:
      operationId: healthCheck
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session_id
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key with pc_live_ prefix"

  schemas:
    RegisterRequest:
      type: object
      required: [email, slug, password]
      properties:
        email:
          type: string
          format: email
        slug:
          type: string
          pattern: "^[a-z0-9-]{3,30}$"
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        session_id:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [free, pro]
        created_at:
          type: string
          format: date-time

    MonitorTypeInfo:
      type: object
      properties:
        type:
          type: string
        label:
          type: string
        schema:
          $ref: "#/components/schemas/ConfigSchema"

    ConfigSchema:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ConfigField"

    ConfigField:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        type:
          type: string
        required:
          type: boolean
        default: {}
        placeholder:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/ConfigOption"

    ConfigOption:
      type: object
      properties:
        value:
          type: string
        label:
          type: string

    Monitor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        check_config:
          type: object
          additionalProperties: true
        target:
          type: string
          description: "Display string: 'GET https://...', 'tcp://host:port', 'dns://hostname'"
        interval_seconds:
          type: integer
        alert_after_failures:
          type: integer
        is_paused:
          type: boolean
        is_public:
          type: boolean
        current_status:
          type: string
          enum: [up, down, unknown]
        created_at:
          type: string
          format: date-time

    MonitorWithUptime:
      allOf:
        - $ref: "#/components/schemas/Monitor"
        - type: object
          properties:
            uptime_24h:
              type: number
              format: float

    MonitorDetail:
      allOf:
        - $ref: "#/components/schemas/Monitor"
        - type: object
          properties:
            uptime_24h:
              type: number
            uptime_7d:
              type: number
            uptime_30d:
              type: number
            chart_data:
              type: array
              items:
                $ref: "#/components/schemas/ChartPoint"
            incidents:
              type: array
              items:
                $ref: "#/components/schemas/Incident"

    CreateMonitorRequest:
      type: object
      required: [name, type, check_config]
      properties:
        name:
          type: string
        type:
          type: string
        check_config:
          type: object
          additionalProperties: true
        interval_seconds:
          type: integer
          default: 300
        alert_after_failures:
          type: integer
          default: 3
        is_public:
          type: boolean
          default: false

    UpdateMonitorRequest:
      type: object
      properties:
        name:
          type: string
        check_config:
          type: object
          additionalProperties: true
        interval_seconds:
          type: integer
        alert_after_failures:
          type: integer
        is_paused:
          type: boolean
        is_public:
          type: boolean

    ChartPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        avg_response_ms:
          type: number
        check_count:
          type: integer

    Incident:
      type: object
      required: [id, monitor_id, started_at, cause, state, is_manual]
      properties:
        id:
          type: integer
          format: int64
        monitor_id:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        cause:
          type: string
        state:
          type: string
          enum: [investigating, identified, monitoring, resolved]
        is_manual:
          type: boolean
        title:
          type: string
          nullable: true

    CreateIncidentRequest:
      type: object
      required: [monitor_id, title, body]
      properties:
        monitor_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 200
        body:
          type: string
          minLength: 1
          maxLength: 4000

    UpdateIncidentStateRequest:
      type: object
      required: [state, body]
      properties:
        state:
          type: string
          enum: [investigating, identified, monitoring, resolved]
        body:
          type: string
          minLength: 1
          maxLength: 4000

    IncidentUpdate:
      type: object
      required: [id, incident_id, state, body, posted_at, posted_by_user_id]
      properties:
        id:
          type: integer
          format: int64
        incident_id:
          type: integer
          format: int64
        state:
          type: string
          enum: [investigating, identified, monitoring, resolved]
        body:
          type: string
        posted_by_user_id:
          type: string
          format: uuid
        posted_at:
          type: string
          format: date-time

    AtlassianImportResult:
      type: object
      required: [monitors_created, incidents_created, updates_created, components_skipped]
      properties:
        monitors_created: { type: integer }
        incidents_created: { type: integer }
        updates_created: { type: integer }
        components_skipped: { type: integer }

    Branding:
      type: object
      properties:
        logo_url:
          type: string
          nullable: true
        accent_color:
          type: string
          nullable: true
          description: "Hex like #3b82f6. Rendered as --accent CSS var on the status page."
        custom_footer_text:
          type: string
          nullable: true

    FounderStatus:
      type: object
      required: [available, used, cap]
      properties:
        available:
          type: boolean
        used:
          type: integer
          format: int64
        cap:
          type: integer

    PublicStats:
      type: object
      required: [monitors_count, incidents_resolved, public_status_pages]
      properties:
        monitors_count:
          type: integer
          format: int64
        incidents_resolved:
          type: integer
          format: int64
        public_status_pages:
          type: integer
          format: int64

    StatusPageResponse:
      type: object
      properties:
        slug:
          type: string
        all_up:
          type: boolean
        show_branding:
          type: boolean
          description: "True when the page should show the 'powered by PingCast' watermark — i.e. owner is on the Free tier."
        branding:
          $ref: "#/components/schemas/Branding"
        monitors:
          type: array
          items:
            $ref: "#/components/schemas/StatusMonitor"
        incidents:
          type: array
          items:
            $ref: "#/components/schemas/Incident"

    StatusMonitor:
      type: object
      properties:
        name:
          type: string
        current_status:
          type: string
        uptime_90d:
          type: number

    HealthResponse:
      type: object
      properties:
        status:
          type: string

    NotificationChannel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        config:
          type: object
          additionalProperties: true
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateChannelRequest:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
        type:
          type: string
        config:
          type: object
          additionalProperties: true

    UpdateChannelRequest:
      type: object
      properties:
        name:
          type: string
        config:
          type: object
          additionalProperties: true
        is_enabled:
          type: boolean

    ChannelTypeInfo:
      type: object
      properties:
        type:
          type: string
        label:
          type: string
        schema:
          $ref: "#/components/schemas/ConfigSchema"

    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    CreateAPIKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
            enum: ["monitors:read", "monitors:write", "channels:read", "channels:write"]
        expires_in_days:
          type: integer
          description: "0 or omitted = never expires"

    APIKeyCreated:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/APIKey"
        raw_key:
          type: string
          description: "Shown only once. Store securely."

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
