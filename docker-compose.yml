services:
  api:
    build:
      context: .
      args:
        SERVICE: api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://pingcast:pingcast@db:5432/pingcast?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      PORT: "8080"
      BASE_URL: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  scheduler:
    build:
      context: .
      args:
        SERVICE: scheduler
    environment:
      DATABASE_URL: postgres://pingcast:pingcast@db:5432/pingcast?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  worker:
    build:
      context: .
      args:
        SERVICE: worker
    environment:
      DATABASE_URL: postgres://pingcast:pingcast@db:5432/pingcast?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  notifier:
    build:
      context: .
      args:
        SERVICE: notifier
    environment:
      DATABASE_URL: postgres://pingcast:pingcast@db:5432/pingcast?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pingcast
      POSTGRES_PASSWORD: pingcast
      POSTGRES_DB: pingcast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pingcast"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Observability stack ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./deploy/otel/collector-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:2.3.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/otel/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  pgdata:
  redisdata:
  nats-data:
  tempo-data:
  loki-data:
  grafana-data:
